<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FileKey Drop: get files, end-to-end encrypted</title>
<link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Give anyone a link. Whatever they drop arrives end-to-end encrypted to your passkey.">
<link rel="stylesheet" href="/style.css">
<script>/* apply saved theme before paint (default light; "auto" follows the OS) */try{var t=localStorage.getItem('filekey-theme');if(t==='dark'||(t==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.dataset.theme='dark';var m=document.querySelector('meta[name="theme-color"]');if(m)m.content='#0c0c0e';}}catch(e){}</script>
</head>
<body>
<div id=main_window>
  <div id=logo_container><div id=logo_bar></div></div>
  <div id=chiz_container>
    <div id=chiz_hidden_click_container></div>
    <div id=chiz_icon_container role="button" tabindex="0" aria-label="Menu" aria-expanded="false">
      <span class="chiz_bar chiz_bar_top"></span><span class="chiz_bar chiz_bar_mid"></span><span class="chiz_bar chiz_bar_bot"></span>
    </div>
    <div id=chiz_menu_container>
      <div id=chiz_menu_inner>
        <div id=chiz_list>
          <span class="chiz_heading top_menu_heading">FILEKEY</span>
          <a class="chiz_item plain_menu_link no_select" href="https://filekey.app"><span class="plain_menu_label">Open FileKey</span></a>
          <a class="chiz_item plain_menu_link no_select" href="https://filekey.app/blog/" target=_blank rel="noopener"><span class="plain_menu_label">Blog</span></a>
          <a class="chiz_item plain_menu_link no_select" href="https://github.com/RockwellShah/filekey" target=_blank rel="noopener noreferrer"><span class="plain_menu_label">GitHub</span></a>
          <span class=chiz_heading>APPEARANCE</span>
          <div class="theme_row no_select" id="theme_row" role="radiogroup" aria-label="Appearance">
            <span class="theme_opt" data-mode="light" role="radio" tabindex="0">Light</span>
            <span class="theme_sep" aria-hidden="true">·</span>
            <span class="theme_opt" data-mode="dark" role="radio" tabindex="0">Dark</span>
            <span class="theme_sep" aria-hidden="true">·</span>
            <span class="theme_opt" data-mode="auto" role="radio" tabindex="0">Auto</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id=main_container>
    <div id=main_inner></div>
    <div id=outer_drop_container>
      <div id=drop_container>
        <input type="file" id="file_input">
        <div class=dc_icon_container></div>
        <div class=dc_txt_container><span class=file_title>Drop a file to send</span></div>
        <div class=dc_buttons>
          <button id=choose_file class="dc_btn dc_btn_primary no_select">Choose File</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module" src="/dist/app.js"></script>
</body>
</html>
