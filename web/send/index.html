<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Send files · receive.link</title>
<meta name="robots" content="noindex">
<!-- Share links are minted as /u#<code>, so THIS page's card is what chat/social previews show when a
     receiver shares their link. The clicker is a SENDER: the card is the receiver's invitation ("Send me
     a file"), not the homepage's product pitch. Scrapers never see the #fragment, so the card is generic
     per page (no per-link personalization possible). -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="receive.link">
<meta property="og:url" content="https://receive.link/u">
<meta property="og:title" content="Send me a file">
<meta property="og:description" content="This is my personal receive.link. Anything you send here is encrypted so only I can open it.">
<meta property="og:image" content="https://receive.link/og-send.png">
<meta property="og:image:width" content="2400">
<meta property="og:image:height" content="1260">
<meta property="og:image:alt" content="Send me a file. Only I can open it.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Send me a file">
<meta name="twitter:description" content="This is my personal receive.link. Anything you send here is encrypted so only I can open it.">
<meta name="twitter:image" content="https://receive.link/og-send.png">
<link rel="icon" href="/brand/favicon.svg" type="image/svg+xml">
<!-- The SEND page (sender opens a share link to send files). Served at /u via _redirects -> /send/.
     home-send.ts drives the [data-state] panels and calls fk/send.ts. Fonts absolute (/home/fonts/). -->
<style>
@font-face{font-family:'Nunito';font-style:normal;font-weight:400 800;font-display:swap;src:url('/home/fonts/nunito.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:400;font-display:swap;src:url('/home/fonts/spectral-400.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:500;font-display:swap;src:url('/home/fonts/spectral-500.woff2') format('woff2')}
*{box-sizing:border-box}
[hidden]{display:none!important}
a{text-decoration:none;color:inherit}
body{margin:0;background:#ECF1E9;font-family:'Nunito',system-ui,sans-serif;line-height:1.5}
.rk{--ink:#1A1F2B;--mut:#74767E;--card:#F9FBF7;--ln:#D9E2D4;--cream:#E9EFE6;--g:#23A267;color:var(--ink)}
.frame{min-height:100svh;display:flex;flex-direction:column;align-items:center;padding:46px 22px 72px}
.logo{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:21px;letter-spacing:-.01em;margin-bottom:48px}
.logo .dotp{color:var(--g)}.logo .tld{color:#9499A3;font-weight:600}
.col{width:100%;max-width:464px;text-align:center}
.st[hidden]{display:none}
.icon{width:58px;height:58px;border-radius:17px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.icon.ok{background:#fff;border:1px solid var(--ln);color:var(--g)}
.icon.bad{background:#fff;border:1px solid var(--ln);color:#D2502E}
.spin{width:46px;height:46px;border-radius:50%;border:3px solid #DBE4D6;border-top-color:var(--g);margin:6px auto 26px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
h1{font-family:'Nunito',system-ui,sans-serif;font-weight:800;font-size:31px;letter-spacing:-.015em;line-height:1.12;margin:0 0 12px}
.sub{font-size:15px;color:var(--mut);font-weight:500;line-height:1.55;margin:0 auto;max-width:360px}

/* Drop zone */
.drop{border:2px dashed #C1CCBD;border-radius:18px;background:#F9FBF7;padding:42px 24px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-top:30px}
.drop:hover{border-color:var(--g);background:#F6F8F4}
.drop.drag{border-color:var(--g);background:#EAF3EC}
.dropicon{width:42px;height:42px;color:var(--g);margin-bottom:14px}
.dropmain{font-weight:700;font-size:16px;color:var(--ink)}
.dropbtns{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.dc_btn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;background:#fff;color:var(--ink);border:1px solid var(--ln);border-radius:20px;padding:9px 17px;font-size:13.5px;font-weight:700;cursor:pointer;transition:border-color .15s,background .15s,color .15s}
.dc_btn:hover{border-color:var(--g);background:#F1F6F2;color:var(--g)}
.dc_btn svg{width:16px;height:16px;flex:none}
.dc_btn:focus-visible{outline:2px solid var(--g);outline-offset:2px}

/* Working (encrypt/upload) */
.filecard{display:flex;align-items:center;gap:13px;border:1px solid var(--ln);border-radius:14px;padding:14px 16px;background:#fff;text-align:left;margin-bottom:6px}
.ficon{width:24px;height:24px;color:var(--mut);flex:none}
.finfo{min-width:0;flex:1}
.fname{font-weight:700;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{font-size:12.5px;color:var(--mut);font-weight:500}
.prog{text-align:left;margin-top:20px}
.phase{font-weight:700;font-size:14.5px;color:var(--ink);display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.bytes{font-size:12.5px;color:var(--mut);font-weight:600;font-variant-numeric:tabular-nums}
.bar{height:8px;background:#DBE4D6;border-radius:6px;overflow:hidden;margin-top:11px}
.barfill{height:100%;background:var(--g);border-radius:6px;width:0;transition:width .2s ease}
.bar.indet .barfill{width:40%!important;animation:indet 1.1s ease-in-out infinite}
@keyframes indet{0%{margin-left:-40%}100%{margin-left:100%}}
.cancel{background:none;border:0;font-family:inherit;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;margin-top:18px}
.cancel:hover{color:#C0452A}

/* Buttons */
.btn{font-family:inherit;background:var(--g);color:#fff;border:0;border-radius:22px;padding:13px 24px;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:0 1px 2px rgba(35,162,103,.2);transition:background .15s,box-shadow .15s}
.btn:hover{background:#1F9760;box-shadow:0 2px 10px rgba(35,162,103,.26)}
.btn:active{background:#1C8957}
.btn.full,.btn.solo{display:block;width:100%;max-width:300px;margin:30px auto 0;text-align:center}
.btn:focus-visible,.cancel:focus-visible{outline:2px solid var(--g);outline-offset:2px}
.err{color:#C0452A}
@media(max-width:480px){h1{font-size:27px}.logo{margin-bottom:40px}.frame{padding:40px 20px 64px}.drop{padding:36px 18px}}
</style>
</head>
<body>
<div class="rk">
<div class="frame">
  <a class="logo" href="/"><svg width="23" height="23" viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="none" stroke="#23A267" stroke-width="12"/><circle cx="50" cy="50" r="12" fill="currentColor"/></svg><span>receive<span class="dotp">.</span><span class="tld">link</span></span></a>
  <main class="col">
    <div class="st" data-state="loading">
      <div class="spin"></div>
      <h1>Checking this link</h1>
      <p class="sub">One moment.</p>
    </div>

    <div class="st" data-state="ready" hidden>
      <h1 id="sendh">Send files</h1>
      <p class="sub" id="sendsub">They're encrypted in your browser, so only the recipient can open them.</p>
      <div class="drop" id="drop">
        <svg class="dropicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 9l5 -5l5 5"/><path d="M12 4l0 12"/></svg>
        <div class="dropmain">Drop files or folders here</div>
        <div class="dropbtns">
          <button class="dc_btn" id="browse" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/></svg>Choose files</button>
          <button class="dc_btn" id="folderbtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2"/></svg>Choose folder</button>
        </div>
      </div>
      <input type="file" id="fileinput" multiple hidden>
      <input type="file" id="folderinput" webkitdirectory hidden>
    </div>

    <div class="st" data-state="working" hidden>
      <div class="filecard">
        <svg class="ficon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/></svg>
        <div class="finfo"><div class="fname" id="fname">Files</div><div class="fsize" id="fsize"></div></div>
      </div>
      <div class="prog">
        <div class="phase"><span id="phase">Preparing</span><span class="bytes" id="bytes"></span></div>
        <div class="bar"><div class="barfill" id="barfill"></div></div>
      </div>
      <button class="cancel" id="cancel" type="button" hidden>Cancel</button>
    </div>

    <div class="st" data-state="sent" hidden>
      <div class="icon ok"><svg viewBox="0 0 24 24" width="29" height="29" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l5 5l10 -10"/></svg></div>
      <h1>Sent!</h1>
      <p class="sub" id="sentsub">We emailed them a secure download link.</p>
      <button class="btn solo" id="sendmore" type="button">Send more files</button>
    </div>

    <div class="st" data-state="error" hidden>
      <div class="icon bad"><svg viewBox="0 0 24 24" width="29" height="29" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v4"/><path d="M10.363 3.591l-8.106 13.534a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636 -2.87l-8.106 -13.536a1.914 1.914 0 0 0 -3.274 0z"/><path d="M12 16h.01"/></svg></div>
      <h1>Something went wrong</h1>
      <p class="sub err" id="errmsg">Please try again.</p>
      <button class="btn solo" id="errbtn" type="button">Try again</button>
    </div>
  </main>
</div>
</div>
<script type="module" src="/dist/home-send.js?v=66040790ef"></script>
</body>
</html>
