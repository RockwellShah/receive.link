<!doctype html>
<!-- Social share card SOURCE for a SHARED LINK (/u#code): the person clicking is a SENDER, so the card
     is the receiver's invitation, not the homepage pitch. NOT deployed (web/.assetsignore).
     Re-render to web/og-send.png: serve web/ locally, then a 1200x630 headless screenshot at 2x. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
@font-face{font-family:'Nunito';font-style:normal;font-weight:400 800;font-display:block;src:url('/home/fonts/nunito.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:500;font-display:block;src:url('/home/fonts/spectral-500.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#ECF1E9;font-family:'Nunito',system-ui,sans-serif;color:#1A1F2B;-webkit-font-smoothing:antialiased}
.stack{display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 64px}
.pill{display:inline-flex;align-items:center;gap:10px;font-size:24px;font-weight:700;color:#4A4D55;background:#fff;border:1px solid #D9E2D4;border-radius:34px;padding:13px 28px;box-shadow:0 2px 10px rgba(26,31,43,.05);margin-bottom:44px}
.pill svg{width:25px;height:25px;color:#23A267;flex:none}
h1{font-family:'Nunito',system-ui,sans-serif;font-weight:800;font-size:84px;line-height:1.04;letter-spacing:-.02em;max-width:1040px}
.logo{display:inline-flex;align-items:center;gap:16px;margin-top:50px;font-weight:700;font-size:56px;letter-spacing:-.01em}
.logo svg{width:56px;height:56px;flex:none}
.dotp{color:#23A267}
.tld{color:#9499A3;font-weight:600}
</style>
</head>
<body>
  <div class="stack">
    <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6z"/><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"/><path d="M8 11v-4a4 4 0 1 1 8 0v4"/></svg>End-to-end Encrypted</span>
    <h1>Send me a file.<br>Only I can open it.</h1>
    <div class="logo"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="none" stroke="#23A267" stroke-width="12"/><circle cx="50" cy="50" r="12" fill="#1A1F2B"/></svg><span>receive<span class="dotp">.</span><span class="tld">link</span></span></div>
  </div>
  <script>(async()=>{try{await document.fonts.ready}catch(e){}document.documentElement.setAttribute('data-fitted','1')})();</script>
</body>
</html>
