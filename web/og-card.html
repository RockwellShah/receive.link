<!doctype html>
<!-- Social share card SOURCE for receive.link. Not deployed (see web/.assetsignore).
     Re-render to web/og.png with the dev server running, then a headless screenshot:
       bun run web/serve.ts                 # serves this + /fonts/inter.woff2 at :8080
       (browse) viewport 1200x630 --scale 2; goto http://localhost:8080/og-card.html; screenshot web/og.png -->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 100 900; font-display: block; src: url('/fonts/inter.woff2') format('woff2'); }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffffff; font-family: 'Inter', system-ui, sans-serif; color: #0E0E16; -webkit-font-smoothing: antialiased; }
.headline { font-size: 120px; font-weight: 700; line-height: 1.03; letter-spacing: -0.03em; text-align: center; }
.green { color: #23A267; }
.logo { display: flex; align-items: center; gap: 14px; margin-top: 64px; }
.mark { height: 58px; width: 58px; display: block; }
.word { font-size: 60px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
.tld { color: #9A98A8; font-weight: 400; }
</style>
</head>
<body>
  <div class="headline">Receive&nbsp;Files<br><span class="green">Privately</span></div>
  <div class="logo">
    <svg class="mark" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#23A267" stroke-width="5" opacity="0.3"/>
      <circle cx="50" cy="50" r="22" fill="none" stroke="#23A267" stroke-width="9"/>
      <circle cx="50" cy="50" r="9" fill="#0E0E16"/>
    </svg>
    <div class="word">receive<span class="green">.</span><span class="tld">link</span></div>
  </div>
  <script>
    (async () => { try { await document.fonts.ready; } catch (e) {} document.documentElement.setAttribute('data-fitted', '1'); })();
  </script>
</body>
</html>
