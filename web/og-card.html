<!doctype html>
<!-- Social share card SOURCE for receive.link. Not deployed (see web/.assetsignore).
     Re-render to web/og.png with the dev server running, then a headless screenshot:
       bun run web/serve.ts                 # serves this + /fonts/inter.woff2 at :8080
       (browse) viewport 1200x630 --scale 2; goto http://localhost:8080/og-card.html; screenshot web/og.png -->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 100 900; font-display: block; src: url('/fonts/inter.woff2') format('woff2'); }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffffff; font-family: 'Inter', system-ui, sans-serif; color: #0a0a0a; -webkit-font-smoothing: antialiased; }
.row { font-size: 150px; display: flex; align-items: center; gap: 0.2em; }
.logo { height: 0.9em; width: 0.9em; }
.name { font-size: 1em; font-weight: 680; letter-spacing: -0.035em; line-height: 1; }
.dot { color: #23A267; }
.tld { color: #8a8a92; font-weight: 600; }
.tag { margin-top: 56px; font-size: 44px; font-weight: 560; color: #161616; letter-spacing: -0.5px; }
.points { margin-top: 30px; font-size: 28px; font-weight: 500; color: #8a8a92; letter-spacing: 0.2px; }
</style>
</head>
<body>
  <div class="row">
    <svg class="logo" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#23A267" stroke-width="5" opacity="0.3"/>
      <circle cx="50" cy="50" r="22" fill="none" stroke="#23A267" stroke-width="9"/>
      <circle cx="50" cy="50" r="9" fill="#0a0a0a"/>
    </svg>
    <div class="name">receive<span class="dot">.</span><span class="tld">link</span></div>
  </div>
  <div class="tag">Give anyone a link to send you files</div>
  <div class="points">End-to-end encrypted&nbsp; ·&nbsp; No account&nbsp; ·&nbsp; Open source</div>
  <script>
    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      const row = document.querySelector('.row'), tag = document.querySelector('.tag');
      // Scale the logo + wordmark so the row spans exactly the tagline's width.
      for (let i = 0; i < 5; i++) {
        const fs = parseFloat(getComputedStyle(row).fontSize);
        row.style.fontSize = (fs * tag.offsetWidth / row.offsetWidth) + 'px';
      }
      document.documentElement.setAttribute('data-fitted', '1');
    })();
  </script>
</body>
</html>
