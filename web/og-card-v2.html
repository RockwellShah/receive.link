<!doctype html>
<!-- Social share card SOURCE v2 for receive.link — value-prop version that mirrors the redesign hero
     (cream bg, Spectral headline, green-lock E2E pill, ring-dot wordmark). NOT deployed (web/.assetsignore).
     Re-render to web/og-v2.png with the dev server running, then a headless screenshot:
       bun run web/serve.ts                 # serves this + /home/fonts/*.woff2 at :8080
       (browse) viewport 1200x630 --scale 2; goto http://localhost:8080/og-card-v2.html; screenshot web/og-v2.png -->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
@font-face{font-family:'Nunito';font-style:normal;font-weight:400 800;font-display:block;src:url('/home/fonts/nunito.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:500;font-display:block;src:url('/home/fonts/spectral-500.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px}
body{position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#EDE8DF;font-family:'Nunito',system-ui,sans-serif;color:#1A1F2B;-webkit-font-smoothing:antialiased}
/* Soft green glow rising from the bottom-center, same recipe as the hero .wash */
.wash{position:absolute;left:0;right:0;bottom:0;height:430px;background:radial-gradient(46% 92% at 50% 100%,#bfe0cf 0%,#d3e6dc 36%,rgba(237,232,223,0) 72%);pointer-events:none}
.stack{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 64px}
.pill{display:inline-flex;align-items:center;gap:9px;font-size:20px;font-weight:700;color:#4A4D55;background:#fff;border:1px solid #E5DFD2;border-radius:30px;padding:11px 24px;box-shadow:0 2px 10px rgba(26,31,43,.05);margin-bottom:42px}
.pill svg{width:21px;height:21px;color:#23A267;flex:none}
h1{font-family:'Spectral',Georgia,serif;font-weight:500;font-size:84px;line-height:1.04;letter-spacing:-.02em;max-width:1040px}
.logo{display:inline-flex;align-items:center;gap:11px;margin-top:54px;font-weight:700;font-size:34px;letter-spacing:-.01em}
.logo svg{width:34px;height:34px;flex:none}
.dotp{color:#23A267}
.tld{color:#9499A3;font-weight:600}
</style>
</head>
<body>
  <div class="wash"></div>
  <div class="stack">
    <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6z"/><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"/><path d="M8 11v-4a4 4 0 1 1 8 0v4"/></svg>End-to-end Encrypted</span>
    <h1>Receive files privately<br>with one link.</h1>
    <div class="logo"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="none" stroke="#23A267" stroke-width="12"/><circle cx="50" cy="50" r="12" fill="#1A1F2B"/></svg><span>receive<span class="dotp">.</span><span class="tld">link</span></span></div>
  </div>
  <script>(async()=>{try{await document.fonts.ready}catch(e){}document.documentElement.setAttribute('data-fitted','1')})();</script>
</body>
</html>
