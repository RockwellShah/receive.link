# receive.link - Worker config. Secrets (server keys, R2 creds) are set via wrangler, not here.
#
# DEFAULT env = the ISOLATED MONETIZATION worker. Monetization is experimental and lives on this branch;
# it must NOT deploy to the shared "filekey-drop-staging" Worker — a prior `wrangler deploy` here once
# did, leaving the v2 ReceiverAccount DO on staging and blocking the mainline email Worker. A distinct
# Worker name gives monetization its OWN Durable Object namespace + migration history, so its deploys
# never collide with staging again. Deploy: `wrangler deploy` (this env) / `--env production` for prod.
name = "receive-link-monetization"
main = "worker/src/worker.ts"
compatibility_date = "2026-06-01"

account_id = "30d5a45850ef3f60dcd4b75a5b5dd39b"

# Outbound transactional email (Cloudflare Email Service). The sender domain
# (MAIL_FROM) must be onboarded + DKIM-verified in the dashboard first.
[[send_email]]
name = "EMAIL"

# Ciphertext relay. Set a lifecycle rule on the bucket to expire objects ~7 days
# (Dashboard > R2 > bucket > Settings, or `wrangler r2 bucket lifecycle`).
[[r2_buckets]]
binding = "DROP_BUCKET"
bucket_name = "filekey-drop-staging"

# One-time confirm-token nonces + rate-limit counters.
[[kv_namespaces]]
binding = "DROP_KV"
id = "c277258851044785971403e8d458b76d"

# Atomic per-object completion guard (exactly-once delivery). SQLite-backed Durable Object.
[[durable_objects.bindings]]
name = "COMPLETION"
class_name = "CompletionGuard"

# Persistent per-recipient account: cumulative inbound metering + the capacity cap. SQLite-backed DO,
# one instance per receiver id (an HMAC of the recipient's confirmed email; see RECEIVER_ID_SECRET).
[[durable_objects.bindings]]
name = "RECEIVER"
class_name = "ReceiverAccount"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CompletionGuard"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ReceiverAccount"]

[vars]
# This (default) env is the isolated MONETIZATION worker (own DO namespace; see header). It still SHARES
# the staging R2 bucket + KV below — that alone stops the Worker/DO collision. For FULL isolation, create
# its own bucket + KV and repoint DROP_BUCKET / DROP_KV / R2_BUCKET (see the secrets/setup note).
# ALLOWED_ORIGIN is the Worker's own route: add `mon.receive.link` in the dashboard, or use the
# *.workers.dev URL for API/smoke testing. Email links point here, so they only resolve once routed.
ALLOWED_ORIGIN = "https://mon.receive.link"
MAIL_FROM = "files@drop.filekey.app"
SERVER_SIGN_PUBLIC_JWK = '{"crv":"P-256","ext":true,"key_ops":["verify"],"kty":"EC","x":"wQspI1R3MyBRr0hPRba5LEbKH643Gbl0-EdqKbAVH1E","y":"3twD-Dp7LZXQkJQQ_M8X9dN_LtaC2kUZ-Il6CR5gEcE"}'
# Id stamped into newly minted links. To rotate the signing key: bump this, set the new key as
# SERVER_SIGN_PUBLIC_JWK, and keep the old one as SERVER_SIGN_PUBLIC_JWK_PREV + SERVER_SIGN_KEY_ID_PREV
# so already-minted (permanent) links keep verifying.
SERVER_SIGN_KEY_ID = "1"
R2_ACCOUNT_ID = "30d5a45850ef3f60dcd4b75a5b5dd39b"            # <id>.r2.cloudflarestorage.com
R2_BUCKET = "filekey-drop-staging"                 # bucket name for S3 presigning
MAX_UPLOAD_BYTES = "5000000000000"                 # 5 TB. Caps the ciphertext (= the R2 object). R2's hard object ceiling is 4.995 TiB (~5.49 TB); 5 TB sits safely under it with room for ciphertext overhead. At this size computePartSize keeps partCount ~9000, under R2's 10k-part limit.
# Staging exercises multipart on small files: anything over 1 MiB splits into >=5 MiB
# parts (5 MiB is R2's real minimum for non-last parts). Prod will use the higher default.
MULTIPART_THRESHOLD = "1048576"                     # 1 MiB
MULTIPART_MIN_PART = "5242880"                      # 5 MiB
# Staging runs the per-day abuse caps high so testing isn't throttled. Prod omits
# these (its [env.production.vars]) and falls back to the strict defaults in handlers.ts.
REG_EMAIL_PER_DAY = "1000"
REG_IP_PER_DAY = "1000"

# Secrets are PER-WORKER (DO NOT put here). This default env is now its own Worker
# (receive-link-monetization), so set ALL of these ON IT before it can run (the old staging Worker's
# secrets do NOT carry over to a new name). Use `--env production` for prod.
#   wrangler secret put SERVER_KEM_PRIVATE_JWK    # from gen-keys
#   wrangler secret put SERVER_SIGN_PRIVATE_JWK   # from gen-keys (matches SERVER_SIGN_PUBLIC_JWK above)
#   wrangler secret put R2_ACCESS_KEY_ID          # R2 > Manage API tokens
#   wrangler secret put R2_SECRET_ACCESS_KEY
#   wrangler secret put RECEIVER_ID_SECRET        # any long random string; keys recipient accounts to their
#                                                 # confirmed email. Long-lived: rotating it re-keys every account.
#
# Phase 2b billing (Stripe top-up) — set BOTH before checkout activates (it 503s until both exist, so a
# user can never pay before we can credit). Until then the worker runs inert (downloads free):
#   wrangler secret put STRIPE_SECRET_KEY         # sk_test_… (then sk_live_…); Stripe > Developers > API keys
#   wrangler secret put STRIPE_WEBHOOK_SECRET     # whsec_…; from the webhook endpoint you register (below)
# Then flip the download charge on with the var BILLING_ENABLED = "1" (default off = downloads free). No
# Stripe products/prices to create — the packs are defined in worker/src/stripe.ts (dynamic price_data).
# PRICE knob: PRICE_CENTS_PER_GB (a [vars] entry; default 1 = 1¢/GB, $10 = 1 TB). Edit it in the Cloudflare
# dashboard to walk the price with NO code change; the fixed $10/$25/$50/$100 tiers re-derive their GB from
# it, and the price is locked into each checkout so a change can't mis-credit an in-flight payment.
# Register a webhook endpoint in Stripe (Developers > Webhooks): URL https://mon.receive.link/billing/webhook,
# event checkout.session.completed; copy its signing secret into STRIPE_WEBHOOK_SECRET above.
#
# One-time setup for this Worker: set the 5 secrets above; (optional, for full isolation) create its own
# bucket + KV — `wrangler r2 bucket create receive-link-monetization` and
# `wrangler kv namespace create monetization-kv` — then repoint DROP_BUCKET / R2_BUCKET / DROP_KV id;
# (optional, for web testing) add the `mon.receive.link` route in the Cloudflare dashboard.

[env.production]
name = "receive-link"
account_id = "30d5a45850ef3f60dcd4b75a5b5dd39b"

[[env.production.send_email]]
name = "EMAIL"

[[env.production.r2_buckets]]
binding = "DROP_BUCKET"
bucket_name = "receive-link-prod"

[[env.production.kv_namespaces]]
binding = "DROP_KV"
id = "c639ae5f915d4dc1bbc11ef8ba26e4e6"

[[env.production.durable_objects.bindings]]
name = "COMPLETION"
class_name = "CompletionGuard"

[[env.production.durable_objects.bindings]]
name = "RECEIVER"
class_name = "ReceiverAccount"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["CompletionGuard"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["ReceiverAccount"]

[env.production.vars]
ALLOWED_ORIGIN = "https://receive.link"
MAIL_FROM = "files@drop.filekey.app"  # verified sender; swap to files@receive.link once that domain's email is onboarded
SERVER_SIGN_PUBLIC_JWK = '{"crv":"P-256","ext":true,"key_ops":["verify"],"kty":"EC","x":"zjIvdGLoKfO8J88X9FivuNSl6WsV6Xuw8UDKyveBikA","y":"vn2TLgJBXKI8kuo2qYIFAl7zmC3tKUGZhDHB0Z987Lo"}'  # prod keys (keys/prod-*.jwk)
SERVER_SIGN_KEY_ID = "1"                                # see staging note on key rotation
R2_ACCOUNT_ID = "30d5a45850ef3f60dcd4b75a5b5dd39b"
R2_BUCKET = "receive-link-prod"
MAX_UPLOAD_BYTES = "5000000000000"                 # 5 TB (see staging note above)
# Per-recipient cumulative inbound ceiling (the free-tier cap). Intentionally UNSET = uncapped: the
# Worker meters every recipient's inbound now, but rejects nothing, so there's no 1 GB wall before the
# download gate + payments exist. Set to the free ceiling (e.g. "1000000000" = 1 GB) at launch.
# The transactional (reserve/commit-on-won + TTL/alarm) charge has landed, so enabling this no longer
# risks the crash/reclaim double-charge. Still keep it UNSET until the download gate + payment path exist
# (rest of Phase 1 + Phase 2): a capped-out free receiver would otherwise hit a 1 GB wall with no way to
# pay/upgrade.
# RECEIVER_INBOUND_CAP_BYTES = "1000000000"
