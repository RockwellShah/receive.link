# receive.link - Worker config. Secrets (server keys, R2 creds) are set via wrangler, not here.
# Staging is the default env; production overrides below.
name = "filekey-drop-staging"
main = "worker/src/worker.ts"
compatibility_date = "2026-06-01"

account_id = "30d5a45850ef3f60dcd4b75a5b5dd39b"

# Outbound transactional email (Cloudflare Email Service). The sender domain
# (MAIL_FROM) must be onboarded + DKIM-verified in the dashboard first.
[[send_email]]
name = "EMAIL"

# Ciphertext relay. Set a lifecycle rule on the bucket to expire objects ~7 days
# (Dashboard > R2 > bucket > Settings, or `wrangler r2 bucket lifecycle`).
[[r2_buckets]]
binding = "DROP_BUCKET"
bucket_name = "filekey-drop-staging"

# One-time confirm-token nonces + rate-limit counters.
[[kv_namespaces]]
binding = "DROP_KV"
id = "c277258851044785971403e8d458b76d"

# Atomic per-object completion guard (exactly-once delivery). SQLite-backed Durable Object.
[[durable_objects.bindings]]
name = "COMPLETION"
class_name = "CompletionGuard"

# Per-recipient account: prepaid balance + the per-file download charge (monetization). SQLite-backed DO,
# one instance per receiver id (an HMAC of the confirmed email; see RECEIVER_ID_SECRET).
[[durable_objects.bindings]]
name = "RECEIVER"
class_name = "ReceiverAccount"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CompletionGuard"]

# Migration history on this staging Worker: v2 created the ReceiverAccount DO (a Phase-0 test), v3 deleted
# it. The monetization merge brings it back, so v4 RE-creates it — fresh/empty (there was no billing data).
# Keeping v2 + v3 is REQUIRED: they were already applied, so the tag list must match the deployed history.
# (Prod never got v2/v3, so [env.production] goes straight v1 -> v2 to create it; see below.)
[[migrations]]
tag = "v2"
new_sqlite_classes = ["ReceiverAccount"]

[[migrations]]
tag = "v3"
deleted_classes = ["ReceiverAccount"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["ReceiverAccount"]

[vars]
# This (default) env is the STAGING Worker, serving staging.receive.link. It must build its own
# confirm/drop/download links from staging.receive.link so they land back on THIS Worker + KV.
# receive.link is now the separate prod "receive-link" Worker (own KV/keys) - listing it here
# would make staging links point at prod, and prod wouldn't find the confirm nonce.
ALLOWED_ORIGIN = "https://staging.receive.link"
MAIL_FROM = "files@receive.link"
SERVER_SIGN_PUBLIC_JWK = '{"crv":"P-256","ext":true,"key_ops":["verify"],"kty":"EC","x":"wQspI1R3MyBRr0hPRba5LEbKH643Gbl0-EdqKbAVH1E","y":"3twD-Dp7LZXQkJQQ_M8X9dN_LtaC2kUZ-Il6CR5gEcE"}'
# Id stamped into newly minted links. To rotate the signing key: bump this, set the new key as
# SERVER_SIGN_PUBLIC_JWK, and keep the old one as SERVER_SIGN_PUBLIC_JWK_PREV + SERVER_SIGN_KEY_ID_PREV
# so already-minted (permanent) links keep verifying.
SERVER_SIGN_KEY_ID = "1"
R2_ACCOUNT_ID = "30d5a45850ef3f60dcd4b75a5b5dd39b"            # <id>.r2.cloudflarestorage.com
R2_BUCKET = "filekey-drop-staging"                 # bucket name for S3 presigning
# 5 TB. Caps the ciphertext (= the R2 object); R2's hard object ceiling is 4.995 TiB (~5.49 TB), so 5 TB
# sits under it with room for overhead, and computePartSize keeps partCount ~9000 (under the 10k limit).
# The old 5 GiB CopyObject promotion wall is GONE: multipart uploads deliver IN PLACE (no copy;
# SPEC-large-files), verified live 2026-07-04 at 5.5 GB and 11 GB (scripts/smoke-copy-5gb.ts, both
# delivered end-to-end with completion in ~11-15s). The homepage FAQ's max-size answer matches this.
MAX_UPLOAD_BYTES = "5000000000000"
# Staging exercises multipart on small files: anything over 1 MiB splits into >=5 MiB
# parts (5 MiB is R2's real minimum for non-last parts). Prod will use the higher default.
MULTIPART_THRESHOLD = "1048576"                     # 1 MiB
MULTIPART_MIN_PART = "5242880"                      # 5 MiB
# Staging runs the per-day abuse caps high so testing isn't throttled. Prod omits
# these (its [env.production.vars]) and falls back to the strict defaults in handlers.ts.
REG_EMAIL_PER_DAY = "1000"
REG_IP_PER_DAY = "1000"
# Monetization (download charge). Ships INERT: leave BILLING_ENABLED unset so downloads stay free until
# launch, then flip it to "1". PRICE_CENTS_PER_GB: the LAUNCH price IS the code default (1 = 1¢/GB ->
# $10 = 1,000 GB), so LEAVE IT UNSET unless the price ever changes. All byte knobs are DECIMAL
# (1 GB = 1000000000), matching the product copy + credit labels — do not use binary (GiB) values.
# If both caps are set, PAID_ATREST_CAP_BYTES must be >= RECEIVER_INBOUND_CAP_BYTES (a top-up must never
# shrink an inbox; the code clamps paid up to free if misconfigured). All env-tunable, no code change.
# BILLING_ENABLED = "1"
# FREE_GRANT_BYTES = "1000000000"             # 1 GB (decimal) free download credit/account (unset = code default, same value)
# RECEIVER_INBOUND_CAP_BYTES = "1000000000"   # free-tier lifetime inbound cap, decimal (unset = uncapped)
# PAID_ATREST_CAP_BYTES = "100000000000"      # paid-tier at-rest cap = 100 GB decimal (unset = uncapped); keep >= the free cap

# Secrets (DO NOT put here) — set with:
#   wrangler secret put SERVER_KEM_PRIVATE_JWK    # from gen-keys
#   wrangler secret put SERVER_SIGN_PRIVATE_JWK   # from gen-keys
#   wrangler secret put R2_ACCESS_KEY_ID          # R2 > Manage API tokens
#   wrangler secret put R2_SECRET_ACCESS_KEY
#   wrangler secret put HASH_SECRET               # long random (openssl rand -hex 32); keys ALL rate-limit hashing (IPs, emails, tokens). REQUIRED: without it every endpoint 503s (config_error)
#   wrangler secret put RECEIVER_ID_SECRET        # long random; derives the per-recipient account id from the confirmed email. REQUIRED for every delivery even with billing off
#   wrangler secret put STRIPE_SECRET_KEY         # sk_*; checkout 503s until BOTH this + the webhook secret are set
#   wrangler secret put STRIPE_WEBHOOK_SECRET     # whsec_*; from the Stripe webhook (event checkout.session.completed) — register it at the WORKER url (/billing/webhook), never the Pages domain

[env.production]
name = "receive-link"
account_id = "30d5a45850ef3f60dcd4b75a5b5dd39b"

[[env.production.send_email]]
name = "EMAIL"

[[env.production.r2_buckets]]
binding = "DROP_BUCKET"
bucket_name = "receive-link-prod"

[[env.production.kv_namespaces]]
binding = "DROP_KV"
id = "c639ae5f915d4dc1bbc11ef8ba26e4e6"

[[env.production.durable_objects.bindings]]
name = "COMPLETION"
class_name = "CompletionGuard"

[[env.production.durable_objects.bindings]]
name = "RECEIVER"
class_name = "ReceiverAccount"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["CompletionGuard"]

# Prod was at v1 (CompletionGuard only — it never got the staging v2/v3). v2 creates ReceiverAccount here.
[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["ReceiverAccount"]

[env.production.vars]
ALLOWED_ORIGIN = "https://receive.link"
MAIL_FROM = "files@receive.link"  # receive.link onboarded (Email Routing + DKIM live) 2026-06-21
SERVER_SIGN_PUBLIC_JWK = '{"crv":"P-256","ext":true,"key_ops":["verify"],"kty":"EC","x":"zjIvdGLoKfO8J88X9FivuNSl6WsV6Xuw8UDKyveBikA","y":"vn2TLgJBXKI8kuo2qYIFAl7zmC3tKUGZhDHB0Z987Lo"}'  # prod keys (keys/prod-*.jwk)
SERVER_SIGN_KEY_ID = "1"                                # see staging note on key rotation
R2_ACCOUNT_ID = "30d5a45850ef3f60dcd4b75a5b5dd39b"
R2_BUCKET = "receive-link-prod"
MAX_UPLOAD_BYTES = "5000000000000"                 # 5 TB (in-place delivery removed the copy wall; see the staging note above)
# Monetization (same as staging; INERT until launch). Flip BILLING_ENABLED when going live on prod —
# ONLY after the Stripe secrets are set (else the 402 wall shows packs whose checkout 503s). The launch
# price IS the code default (1¢/GB), so PRICE_CENTS_PER_GB stays unset. Byte knobs are DECIMAL; if both
# caps are set, keep PAID_ATREST >= RECEIVER_INBOUND (the code clamps a misconfig). Set HASH_SECRET +
# RECEIVER_ID_SECRET + STRIPE_* as prod secrets (`wrangler secret put --env production`) BEFORE deploying.
# BILLING_ENABLED = "1"
# FREE_GRANT_BYTES = "1000000000"
# RECEIVER_INBOUND_CAP_BYTES = "1000000000"
# PAID_ATREST_CAP_BYTES = "100000000000"
